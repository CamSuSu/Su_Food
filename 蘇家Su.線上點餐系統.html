<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇家Su.線上點餐系統</title>
    <link rel="icon" href="images/sufood.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; transition: background 0.3s; padding-bottom: 80px;}
        .admin-action { cursor: pointer; transition: 0.2s; }
        .admin-action.disabled { opacity: 0.3; pointer-events: none; }
        .category-card { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s; }
        .category-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .store-header { position: sticky; top: 0; background: #f8fafc; z-index: 10; }
        
        @media print { 
            body * { visibility: hidden; }
            #view-receipt, #view-receipt * { visibility: visible; }
            #view-receipt { position: absolute; left: 0; top: 0; width: 100%; display: block !important; padding: 0; margin: 0; border: none; box-shadow: none;}
            .no-print { display: none !important; }
            body { padding: 0; margin: 0; background: white; }
            tr { break-inside: avoid; page-break-inside: avoid; }
            .print-no-shadow { box-shadow: none !important; border: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 relative">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-40 no-print">
        <div class="container mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showView('home')">
                <div class="bg-orange-500 text-white p-2 rounded-lg shadow-sm"><i class="fa-solid fa-store"></i></div>
                <h1 class="text-xl font-black tracking-tight">蘇家Su.線上點餐系統</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="nav-timer" class="hidden bg-red-50 text-red-600 px-3 py-1 rounded-full font-bold animate-pulse border border-red-200 shadow-sm">
                    <i class="fa-solid fa-clock mr-1"></i> <span id="nav-timer-val">00:00</span>
                </div>
                <button onclick="promptAdminLogin()" class="text-slate-500 hover:text-orange-500 font-bold transition flex items-center bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-orange-50">
                    <i class="fa-solid fa-gear sm:mr-1"></i><span class="hidden sm:inline">Su.資料庫管理</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="fixed bottom-4 left-4 bg-white/95 backdrop-blur-md shadow-lg border border-slate-200 rounded-xl p-3 text-xs text-slate-600 z-30 no-print">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-clock-rotate-left text-orange-500"></i>
            <span>線上菜單更新日期：<span id="global-update-date" class="font-bold text-slate-800"></span></span>
        </div>
    </div>

    <button id="btn-back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-4 right-4 bg-slate-800 text-white w-12 h-12 rounded-full shadow-2xl flex items-center justify-center text-xl hover:bg-orange-500 hover:-translate-y-1 transition-all duration-300 opacity-0 pointer-events-none z-50 no-print">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <main class="container mx-auto px-4 py-6 md:py-8 no-print">
        <div id="view-home" class="view-section">
            <div class="mb-8 bg-gradient-to-r from-orange-500 to-amber-500 p-8 md:p-10 rounded-3xl text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-3xl md:text-4xl font-black mb-3">今天想吃什麼？</h2>
                    <p class="opacity-95 text-lg font-bold mb-6">瀏覽各類精選店家，或發起新的點餐活動</p>
                    <button onclick="openStartOrderModal()" class="bg-white text-orange-600 px-8 py-3.5 rounded-xl font-black shadow-lg hover:bg-orange-50 transition transform hover:-translate-y-1 hover:shadow-xl text-lg flex items-center w-max">
                        <i class="fa-solid fa-bolt text-yellow-500 mr-2"></i>發起點餐活動
                    </button>
                </div>
                <i class="fa-solid fa-burger absolute -right-10 -bottom-10 text-[180px] opacity-20 transform -rotate-12"></i>
            </div>
            <div id="category-tabs" class="flex gap-3 overflow-x-auto pb-4 mb-4 custom-scrollbar"></div>
            <div id="store-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </div>

        <div id="view-store-details" class="view-section hidden">
            <button onclick="showView('home')" class="mb-6 text-slate-500 hover:text-orange-500 font-bold flex items-center transition bg-white px-5 py-2.5 rounded-xl shadow-sm border border-slate-200">
                <i class="fa-solid fa-arrow-left mr-2"></i>返回首頁
            </button>
            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row gap-6 items-center md:items-start relative overflow-hidden">
                <div id="browse-store-cover" class="w-32 h-32 md:w-40 md:h-40 rounded-2xl bg-cover bg-center shadow-inner shrink-0 border border-slate-100"></div>
                <div class="flex-1 w-full text-center md:text-left">
                    <h2 id="browse-store-name" class="text-3xl md:text-4xl font-black text-slate-800 mb-3">店家名稱</h2>
                    <div id="browse-store-info" class="flex flex-wrap justify-center md:justify-start gap-3 text-slate-600 font-bold mb-4"></div>
                    <p class="text-orange-600 bg-orange-50 p-3 rounded-xl inline-block border border-orange-100 font-bold w-full md:w-auto"><i class="fa-solid fa-circle-info mr-2"></i>目前為瀏覽模式，若要訂餐請回首頁「發起點餐活動」。</p>
                </div>
            </div>
            <div id="browse-menu-container"></div>
        </div>

        <div id="view-active-order" class="view-section hidden">
            <div class="max-w-4xl mx-auto text-center mb-10">
                <div class="inline-block bg-white border-4 border-red-500 px-8 py-5 md:px-12 md:py-8 rounded-[2.5rem] shadow-2xl mb-8 relative overflow-hidden transform hover:scale-[1.02] transition duration-300">
                    <div class="absolute top-0 left-0 w-full h-2 bg-red-500 animate-pulse"></div>
                    <p class="text-slate-500 font-black mb-2 tracking-widest uppercase"><i class="fa-solid fa-stopwatch mr-2 text-red-500"></i>點餐活動倒數中</p>
                    <div id="big-timer" class="text-6xl md:text-7xl font-black text-red-600 tracking-tighter drop-shadow-sm">00:00</div>
                    <button onclick="unlockByAdmin()" class="mt-6 md:mt-8 w-full bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-2xl text-lg md:text-xl font-bold shadow-lg transition flex justify-center items-center">
                        <i class="fa-solid fa-lock-open mr-2 text-slate-400"></i>提早強制結單 (需密碼)
                    </button>
                </div>
                <h2 id="active-store-name" class="text-4xl md:text-5xl font-black text-slate-800 mb-4 drop-shadow-sm">店家名稱</h2>
                <div id="active-store-info" class="flex flex-wrap justify-center gap-3 text-slate-600 font-bold mb-4"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                <div class="lg:col-span-2"><div id="active-menu-container"></div></div>
                <div class="lg:col-span-1 sticky top-24">
                    <div class="bg-white rounded-[2rem] shadow-xl p-6 md:p-8 border border-slate-100">
                        <h3 class="text-2xl font-black mb-6 border-b-2 border-slate-100 pb-4 flex justify-between items-center text-slate-800">
                            <span><i class="fa-solid fa-basket-shopping text-orange-500 mr-2"></i>已點餐點</span>
                            <span class="text-white bg-orange-500 px-4 py-1.5 rounded-xl text-sm font-black shadow-sm" id="cart-count">0 份</span>
                        </h3>
                        <div id="active-cart-list" class="space-y-4 mb-6 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar"></div>
                        <div class="border-t-2 border-slate-100 pt-6">
                            <div class="flex justify-between items-end mb-2">
                                <span class="text-xl font-bold text-slate-500">總計金額</span>
                                <span id="active-cart-total" class="text-4xl font-black text-red-600">$0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-admin" class="view-section hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b-2 border-slate-200 pb-4">
                <h2 class="text-3xl font-black text-slate-800 flex items-center"><i class="fa-solid fa-database text-orange-500 mr-3 text-3xl"></i>系統資料庫管理</h2>
                <button onclick="logoutAdmin()" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-slate-900 transition shadow-md flex justify-center items-center"><i class="fa-solid fa-right-from-bracket mr-2"></i>返回前台</button>
            </div>
            <div class="flex flex-wrap gap-2 md:gap-3 mb-8 border-b border-slate-200 pb-2">
                <button onclick="switchAdminTab('menu')" id="tab-btn-menu" class="px-6 py-3 rounded-xl font-black transition text-lg w-full sm:w-auto shadow-sm">菜單管理</button>
                <button onclick="switchAdminTab('settings')" id="tab-btn-settings" class="px-6 py-3 rounded-xl font-black transition text-lg w-full sm:w-auto shadow-sm">全域設定</button>
                <button onclick="switchAdminTab('history')" id="tab-btn-history" class="px-6 py-3 rounded-xl font-black transition text-lg w-full sm:w-auto shadow-sm">歷史結單紀錄</button>
                <button onclick="switchAdminTab('logs')" id="tab-btn-logs" class="px-6 py-3 rounded-xl font-black transition text-lg w-full sm:w-auto shadow-sm">系統操作紀錄</button>
            </div>
            <div id="admin-tab-menu" class="grid grid-cols-1 xl:grid-cols-12 gap-8 items-start">
                <div class="xl:col-span-4 bg-white p-6 md:p-8 rounded-[2rem] shadow-xl border border-slate-100 xl:sticky xl:top-24">
                    <h3 id="admin-form-title" class="text-2xl font-black mb-6 text-orange-600 border-b pb-4">新增餐點與店家</h3>
                    <div class="space-y-4" id="admin-input-form">
                        <div>
                            <label class="block text-xs font-bold mb-1 text-slate-500">店家名稱</label>
                            <input list="store-datalist" id="admin-input-store" type="text" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 outline-none focus:border-orange-500 font-bold" onchange="autoFillStoreInfo()">
                            <datalist id="store-datalist"></datalist>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-xs font-bold mb-1 text-slate-500">分類</label><select id="admin-input-cat" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 font-bold"></select></div>
                            <div><label class="block text-xs font-bold mb-1 text-slate-500">子分類</label><select id="admin-input-subcat" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 font-bold"></select></div>
                        </div>
                        <div><label class="block text-xs font-bold mb-1 text-slate-500">餐點名稱</label><input id="admin-input-item" type="text" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 font-bold"></div>
                        <div><label class="block text-xs font-bold mb-1 text-slate-500">價格</label><input id="admin-input-price" type="number" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 font-bold"></div>
                        <button onclick="saveNewItemData()" class="w-full bg-orange-500 text-white font-black py-4 rounded-xl shadow-lg hover:bg-orange-600 transition">確認新增</button>
                    </div>
                </div>
                <div class="xl:col-span-8">
                    <div class="bg-white rounded-[2rem] shadow-xl p-6 border border-slate-100">
                        <input type="text" id="admin-search-input" oninput="renderAdmin()" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 px-6 mb-6 font-bold" placeholder="搜尋店家或餐點...">
                        <div id="admin-data-grouped-list" class="space-y-6"></div>
                    </div>
                </div>
            </div>
            <div id="admin-tab-history" class="hidden">...</div>
            <div id="admin-tab-settings" class="hidden">...</div>
            <div id="admin-tab-logs" class="hidden">...</div>
        </div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-md no-print">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-center">管理員登入</h3>
            <input id="login-user" type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 mb-4 font-bold text-center" placeholder="帳號">
            <input id="login-pwd" type="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 mb-6 font-bold text-center" placeholder="密碼">
            <div class="flex gap-3">
                <button onclick="closeModal('login-modal')" class="flex-1 py-4 font-bold text-slate-400">取消</button>
                <button onclick="handleLogin()" class="flex-2 bg-slate-800 text-white py-4 px-8 rounded-2xl font-black">登入</button>
            </div>
        </div>
    </div>

    <div id="start-modal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl">
            <h3 class="text-xl font-black mb-4">發起點餐活動</h3>
            <select id="start-store-select" class="w-full border-2 border-orange-200 p-3 rounded-xl font-bold mb-4"></select>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="selectTime(5)" class="bg-orange-500 text-white p-2 rounded-lg font-bold">5分</button>
                <button onclick="selectTime(10)" class="bg-slate-100 p-2 rounded-lg font-bold">10分</button>
                <button onclick="selectTime(30)" class="bg-slate-100 p-2 rounded-lg font-bold">30分</button>
            </div>
            <button onclick="executeStartOrder()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-black">開始活動</button>
        </div>
    </div>

    <div id="order-modal" class="fixed inset-0 bg-black/60 hidden z-[110] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden flex flex-col max-h-[90vh]">
            <div id="modal-image" class="h-48 bg-cover bg-center"></div>
            <div class="p-6 overflow-y-auto flex-1">
                <h3 id="modal-title" class="text-2xl font-black mb-2">餐點名稱</h3>
                <p id="modal-price" class="text-2xl font-black text-orange-500 mb-6">$0</p>
                <div class="mb-4">
                    <label class="block font-bold mb-2">點餐人姓名</label>
                    <input id="modal-user" type="text" class="w-full bg-slate-100 p-4 rounded-xl font-bold" placeholder="輸入您的姓名">
                </div>
                <div class="flex items-center gap-4 mb-6">
                    <button onclick="adjQty(-1)" class="w-12 h-12 bg-slate-100 rounded-lg font-bold">-</button>
                    <input id="modal-qty" type="number" value="1" readonly class="w-12 text-center font-black text-xl">
                    <button onclick="adjQty(1)" class="w-12 h-12 bg-slate-100 rounded-lg font-bold">+</button>
                </div>
                <button onclick="confirmAddToCart()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black">加入購物車</button>
            </div>
        </div>
    </div>

    <div id="view-receipt" class="view-section hidden">
        <div class="max-w-4xl mx-auto bg-white p-8 rounded-[2rem] shadow-2xl my-8">
            <h2 class="text-3xl font-black text-center mb-6 border-b-4 border-slate-800 pb-4">點餐明細總表</h2>
            <div id="receipt-content"></div>
            <div class="flex gap-4 justify-center mt-8 no-print">
                <button onclick="window.print()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold">列印 PDF</button>
                <button onclick="closeReceipt()" class="bg-slate-100 px-8 py-3 rounded-xl font-bold">返回首頁</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhLO5Fpv0hQ921p1teY_e9Drmfi9jRsQM",
            authDomain: "sufood-2dc61.firebaseapp.com",
            projectId: "sufood-2dc61",
            storageBucket: "sufood-2dc61.firebasestorage.app",
            messagingSenderId: "15294829611",
            appId: "1:15294829611:web:f7f244a5be5dcfc69b066e"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 重要修正：將路徑改為與規則一致的 current_db
        const dbRef = doc(db, "su_system", "current_db");

        // --- 全域狀態 ---
        window.state = {
            categories: [
                { id: 'cat_1', name: '便當快餐', color: '#FFF7ED' },
                { id: 'cat_2', name: '異國料理', color: '#F0F9FF' },
                { id: 'cat_3', name: '手搖飲料', color: '#FEF2F2' }
            ],
            items: [],
            stores: [],
            session: { isActive: false, endTime: null, storeName: null },
            cart: [],
            orderHistory: [],
            quickNames: ['德', '如', '芬', '禾', '亭', '卉'],
            subCategories: ['主餐', '單點', '飲料']
        };

        window.selectedTimeLimit = 5;
        window.isAdminLoggedIn = false;
        const DEFAULT_IMG = "images/Default_cover.png";

        // --- 初始化系統 ---
        async function initSystem() {
            onSnapshot(dbRef, (snap) => {
                if (snap.exists()) {
                    const newData = snap.data();
                    window.state = { ...window.state, ...newData };
                    refreshUI();
                } else {
                    // 若資料庫是空的，初始化一筆
                    setDoc(dbRef, window.state);
                }
            }, (error) => {
                console.error("Firebase 連線失敗:", error);
                alert("無法連線至 Firebase，請檢查規則或網路。");
            });
        }

        function refreshUI() {
            const isNowActive = window.state.session.isActive;
            if (isNowActive) {
                if (document.getElementById('view-active-order').classList.contains('hidden')) {
                    showView('active-order');
                }
                startTimer();
            }
            renderHome();
            if (!document.getElementById('view-admin').classList.contains('hidden')) renderAdmin();
            updateCartUI();
        }

        // --- 共用功能 ---
        window.showView = (name) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${name}`).classList.remove('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');

        // --- 點餐邏輯 ---
        window.renderHome = () => {
            const grid = document.getElementById('store-grid');
            const stores = [...new Set(window.state.items.map(i => i.store))];
            grid.innerHTML = stores.map(s => `
                <div class="category-card bg-white p-6 rounded-3xl shadow-sm border cursor-pointer" onclick="openStoreBrowse('${s}')">
                    <h3 class="text-xl font-black">${s}</h3>
                    <p class="text-slate-400 font-bold">點擊查看菜單</p>
                </div>
            `).join('');

            const tabs = document.getElementById('category-tabs');
            tabs.innerHTML = window.state.categories.map(c => `
                <button class="bg-white px-6 py-2 rounded-xl font-bold shadow-sm whitespace-nowrap">${c.name}</button>
            `).join('');
        };

        window.openStoreBrowse = (name) => {
            document.getElementById('browse-store-name').innerText = name;
            document.getElementById('browse-menu-container').innerHTML = generateMenuHtml(name, false);
            showView('store-details');
        };

        function generateMenuHtml(storeName, active) {
            const items = window.state.items.filter(i => i.store === storeName);
            return items.map(i => `
                <div class="bg-white p-4 rounded-2xl mb-3 flex justify-between items-center shadow-sm" ${active ? `onclick="openOrderModal('${i.id}')"` : ''}>
                    <div>
                        <p class="font-black">${i.name}</p>
                        <p class="text-orange-500 font-black">$${i.price}</p>
                    </div>
                    <i class="fa-solid fa-plus text-slate-300"></i>
                </div>
            `).join('');
        }

        // --- 活動控制 ---
        window.openStartOrderModal = () => {
            const sel = document.getElementById('start-store-select');
            const stores = [...new Set(window.state.items.map(i => i.store))];
            sel.innerHTML = stores.map(s => `<option value="${s}">${s}</option>`).join('');
            openModal('start-modal');
        };

        window.selectTime = (m) => window.selectedTimeLimit = m;

        window.executeStartOrder = async () => {
            const session = {
                isActive: true,
                storeName: document.getElementById('start-store-select').value,
                endTime: Date.now() + (window.selectedTimeLimit * 60000)
            };
            await updateDoc(dbRef, { session: session, cart: [] });
            closeModal('start-modal');
        };

        let timerInterval;
        function startTimer() {
            clearInterval(timerInterval);
            const nav = document.getElementById('nav-timer');
            nav.classList.remove('hidden');
            timerInterval = setInterval(() => {
                const diff = window.state.session.endTime - Date.now();
                if (diff <= 0) {
                    clearInterval(timerInterval);
                    autoCheckout();
                    return;
                }
                const m = Math.floor(diff / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('nav-timer-val').innerText = `${m}:${s}`;
                if(document.getElementById('big-timer')) document.getElementById('big-timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        window.autoCheckout = async () => {
            if (!window.state.session.isActive) return;
            const history = [...(window.state.orderHistory || [])];
            history.unshift({
                store: window.state.session.storeName,
                total: window.state.cart.reduce((a, b) => a + (b.price * b.qty), 0),
                cart: window.state.cart,
                date: new Date().toLocaleString()
            });
            await updateDoc(dbRef, { 
                "session.isActive": false, 
                orderHistory: history.slice(0, 50),
                cart: [] 
            });
            showReceiptFromHistory();
        };

        // --- 購物車 ---
        window.openOrderModal = (id) => {
            const item = window.state.items.find(i => i.id == id);
            window.activeItem = item;
            document.getElementById('modal-title').innerText = item.name;
            document.getElementById('modal-price').innerText = `$${item.price}`;
            document.getElementById('modal-qty').value = 1;
            openModal('order-modal');
        };

        window.adjQty = (v) => {
            const el = document.getElementById('modal-qty');
            el.value = Math.max(1, parseInt(el.value) + v);
        };

        window.confirmAddToCart = async () => {
            const name = document.getElementById('modal-user').value.trim();
            if (!name) return alert("請輸入姓名");
            const newItem = {
                id: Date.now(),
                userName: name,
                itemName: window.activeItem.name,
                price: window.activeItem.price,
                qty: parseInt(document.getElementById('modal-qty').value)
            };
            const newCart = [...window.state.cart, newItem];
            await updateDoc(dbRef, { cart: newCart });
            closeModal('order-modal');
        };

        function updateCartUI() {
            const list = document.getElementById('active-cart-list');
            if(!list) return;
            list.innerHTML = window.state.cart.map(c => `
                <div class="bg-slate-50 p-4 rounded-xl flex justify-between">
                    <div><span class="font-bold">${c.userName}</span>: ${c.itemName} x${c.qty}</div>
                    <div class="font-black">$${c.price * c.qty}</div>
                </div>
            `).join('');
            document.getElementById('active-cart-total').innerText = `$${window.state.cart.reduce((a,b)=>a+(b.price*b.qty), 0)}`;
        }

        // --- 管理員 ---
        window.promptAdminLogin = () => openModal('login-modal');
        window.handleLogin = () => {
            if (document.getElementById('login-user').value === 'koralba' && document.getElementById('login-pwd').value === 'kora1992') {
                window.isAdminLoggedIn = true;
                closeModal('login-modal');
                showView('admin');
            } else alert("密碼錯誤");
        };

        window.saveNewItemData = async () => {
            const newItem = {
                id: Date.now(),
                store: document.getElementById('admin-input-store').value,
                cat: document.getElementById('admin-input-cat').value,
                subCat: document.getElementById('admin-input-subcat').value,
                name: document.getElementById('admin-input-item').value,
                price: parseInt(document.getElementById('admin-input-price').value)
            };
            const items = [...window.state.items, newItem];
            await updateDoc(dbRef, { items });
            alert("新增成功");
        };

        window.renderAdmin = () => {
            const list = document.getElementById('admin-data-grouped-list');
            list.innerHTML = window.state.items.map(i => `
                <div class="border-b p-2 flex justify-between">
                    <span>${i.store} - ${i.name}</span>
                    <button class="text-red-500" onclick="deleteItem('${i.id}')">刪除</button>
                </div>
            `).join('');
            
            document.getElementById('admin-input-cat').innerHTML = window.state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('admin-input-subcat').innerHTML = window.state.subCategories.map(s => `<option value="${s}">${s}</option>`).join('');
        };

        window.deleteItem = async (id) => {
            if(confirm("確定刪除？")) {
                const items = window.state.items.filter(i => i.id != id);
                await updateDoc(dbRef, { items });
            }
        };

        initSystem();
    </script>
</body>
</html>
